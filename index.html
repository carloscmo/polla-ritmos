<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeece8;
    --text: #1a1a1a;
    --text2: #666660;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --purple-light: #EEEDFE;
    --purple-mid: #7F77DD;
    --purple: #534AB7;
    --purple-dark: #3C3489;
    --purple-darkest: #26215C;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e;
      --bg2: #2a2a2a;
      --bg3: #333333;
      --text: #f0f0f0;
      --text2: #999990;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
      --purple-light: #2a2750;
      --purple-mid: #7F77DD;
      --purple: #9B93E8;
      --purple-dark: #AFA9EC;
      --purple-darkest: #CECBF6;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  #container {
    max-width: 680px;
    margin: 0 auto;
  }
  header {
    background: var(--purple);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 16px;
    color: #fff;
  }
  header .logo-icon {
    width: 48px;
    height: 48px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  header h1 { font-size: 20px; font-weight: 500; line-height: 1.2; }
  header p { font-size: 13px; opacity: 0.8; margin-top: 3px; }
  .badge-corte {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #controls {
    display: flex;
    gap: 8px;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
  }
  #search-wrap {
    position: relative;
    flex: 1;
    min-width: 160px;
  }
  #search-wrap i {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--text2);
    pointer-events: none;
  }
  #search {
    width: 100%;
    padding: 0 10px 0 34px;
    height: 38px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  #search:focus { border-color: var(--purple-mid); box-shadow: 0 0 0 3px rgba(127,119,221,0.15); }
  .sort-btn {
    height: 38px;
    padding: 0 14px;
    font-size: 13px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .sort-btn:hover { background: var(--bg2); }
  .sort-btn.active {
    background: var(--purple-light);
    color: var(--purple-dark);
    border-color: var(--purple-mid);
    font-weight: 500;
  }
  #count {
    font-size: 13px;
    color: var(--text2);
    white-space: nowrap;
  }
  #tbl-wrap {
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    overflow: hidden;
    background: var(--bg);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg2); }
  th {
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    text-align: left;
    border-bottom: 0.5px solid var(--border);
  }
  th.col-pos { width: 64px; text-align: center; }
  th.col-pts { width: 110px; text-align: right; }
  td {
    padding: 9px 14px;
    font-size: 14px;
    color: var(--text);
    border-bottom: 0.5px solid var(--border);
  }
  td.col-pos { text-align: center; font-size: 13px; color: var(--text2); }
  td.col-alias { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.col-pts { text-align: right; }
  tr:last-child td { border-bottom: none; }
  tr.me { background: var(--purple-light); }
  tr.me td { color: var(--purple-darkest); }
  tr.me td.col-pos { color: var(--purple); font-weight: 500; }
  .pts-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    min-width: 52px;
  }
  tr.me .pts-pill {
    background: var(--purple);
    color: #fff;
    border-color: var(--purple);
  }
  #no-results {
    padding: 2.5rem;
    text-align: center;
    color: var(--text2);
    font-size: 14px;
  }
  footer {
    margin-top: 1rem;
    text-align: center;
    font-size: 12px;
    color: var(--text2);
  }
</style>

    </div>
    <span class="badge-corte">Corte: 2026-06-17</span>
  </header>

  <div id="controls">
    <div id="search-wrap">
      <i class="ti ti-search"></i>
      <input id="search" type="text" placeholder="Buscar apodo..." oninput="render()">
    </div>
    <button class="sort-btn active" id="btn-pos" onclick="setSort('pos')">
      <i class="ti ti-trophy"></i>Posición
    </button>
    <button class="sort-btn" id="btn-pts" onclick="setSort('pts')">
      <i class="ti ti-star"></i>Puntos
    </button>
    <span id="count"></span>
  </div>

  <div id="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-pos">Lugar</th>
          <th>Apodo</th>
          <th class="col-pts">Pts acum</th>

      <tbody id="tbody"></tbody>
    </table>
    <div id="no-results" style="display:none">Sin resultados para tu búsqueda.</div>

let sortKey='pos', sortDir=1;

function setSort(k){
  if(sortKey===k){sortDir*=-1}else{sortKey=k;sortDir=k==='pos'?1:-1}
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+k).classList.add('active');
  render();
}

function posLabel(p){
  if(p===1)return'🥇';if(p===2)return'🥈';if(p===3)return'🥉';return'#'+p;
}

function render(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  let rows=ALL.filter(r=>r.alias.toLowerCase().includes(q));
  rows.sort((a,b)=>{
    let v=sortKey==='pos'?(a.pos-b.pos):(b.pts-a.pts);
    if(v===0)v=a.alias.localeCompare(b.alias,'es');
    return v*sortDir;
  });
  const tbody=document.getElementById('tbody');
  const noRes=document.getElementById('no-results');
  document.getElementById('count').textContent=rows.length+' jugadores';
  if(rows.length===0){tbody.innerHTML='';noRes.style.display='block';return}
  noRes.style.display='none';
  tbody.innerHTML=rows.map(r=>{
    const isMe=r.alias==='Carlitos';
    return`<tr class="${isMe?'me':''}">
      <td class="col-pos">${posLabel(r.pos)}</td>
      <td class="col-alias">${isMe?'<strong>'+r.alias+' ⭐</strong>':r.alias}</td>
      <td class="col-pts"><span class="pts-pill">${r.pts}</span></td>
    </tr>`;
  }).join('');
}
