<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polla Mundialista · Academia Ritmos 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #C0C0C0;
    --text: #1a1a1a; --text2: #666660;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --purple-light: #EEEDFE; --purple-mid: #7F77DD;
    --purple: #534AB7; --purple-dark: #3C3489; --purple-darkest: #26215C;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e; --bg2: #2a2a2a; --bg3: #C0C0C0;
      --text: #f0f0f0; --text2: #999990;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      --purple-light: #2a2750; --purple-mid: #7F77DD;
      --purple: #9B93E8; --purple-dark: #AFA9EC; --purple-darkest: #CECBF6;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg3); color: var(--text);
    min-height: 100vh; padding: 1.5rem 1rem;
  }
  #container { max-width: 680px; margin: 0 auto; }
  header {
    background: var(--purple); border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 16px; color: #fff;
  }
  header .logo-icon {
    width: 48px; height: 48px; background: rgba(255,255,255,0.2);
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 22px; flex-shrink: 0;
  }
  header h1 { font-size: 20px; font-weight: 500; line-height: 1.2; }
  header p { font-size: 13px; opacity: 0.8; margin-top: 3px; }
  .badge-corte {
    margin-left: auto; background: rgba(255,255,255,0.2);
    border-radius: 20px; padding: 4px 12px;
    font-size: 12px; white-space: nowrap; flex-shrink: 0;
  }
  #controls {
    display: flex; gap: 8px; margin-bottom: 0.75rem;
    flex-wrap: wrap; align-items: center;
  }
  #search-wrap { position: relative; flex: 1; min-width: 160px; }
  #search-wrap i {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%); font-size: 16px;
    color: var(--text2); pointer-events: none;
  }
  #search {
    width: 100%; padding: 0 10px 0 34px; height: 38px;
    border-radius: var(--radius); border: 0.5px solid var(--border2);
    background: var(--bg); color: var(--text); font-size: 14px; outline: none;
  }
  #search:focus { border-color: var(--purple-mid); box-shadow: 0 0 0 3px rgba(127,119,221,0.15); }
  .sort-btn {
    height: 38px; padding: 0 14px; font-size: 13px;
    border-radius: var(--radius); border: 0.5px solid var(--border2);
    background: var(--bg); color: var(--text2); cursor: pointer;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .sort-btn:hover { background: var(--bg2); }
  .sort-btn.active {
    background: var(--purple-light); color: var(--purple-dark);
    border-color: var(--purple-mid); font-weight: 500;
  }
  #count { font-size: 13px; color: var(--text2); white-space: nowrap; }
  #tbl-wrap {
    border-radius: var(--radius-lg); border: 0.5px solid var(--border);
    overflow: hidden; background: var(--bg);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg2); }
  th {
    padding: 10px 14px; font-size: 12px; font-weight: 500;
    color: var(--text2); text-align: left; border-bottom: 0.5px solid var(--border);
  }
  th.col-pos { width: 64px; text-align: center; }
  th.col-pts { width: 100px; text-align: center; }
  td { padding: 9px 14px; font-size: 14px; color: var(--text); border-bottom: 0.5px solid var(--border); }
  td.col-pos { text-align: center; font-size: 13px; color: var(--text2); }
  td.col-alias { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.col-pts { text-align: center; }
  tr:last-child td { border-bottom: none; }
  .pts-pill {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: 20px; padding: 3px 12px;
    font-size: 13px; font-weight: 500; color: var(--text); min-width: 52px;
  }
  #state {
    padding: 2.5rem; text-align: center;
    color: var(--text2); font-size: 14px; display: none;
  }
  #state i { font-size: 32px; display: block; margin-bottom: 8px; opacity: 0.4; }
  #spinner {
    width: 28px; height: 28px; border: 3px solid var(--border2);
    border-top-color: var(--purple); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 10px;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { margin-top: 1rem; text-align: center; font-size: 12px; color: var(--text2); }
  #corte-label { font-size: 13px; color: var(--text2); margin-bottom: 0.6rem; min-height: 18px; }
</style>
</head>
<body>
<div id="container">

  <header>
    <div class="logo-icon">⚽</div>
    <div>
      <h1>Polla Mundialista · Ritmos</h1>
      <p>FIFA World Cup 2026 — Ranking general</p>
    </div>
    <span class="badge-corte" id="badge-corte">Cargando...</span>
  </header>

  <div id="controls">
    <div id="search-wrap">
      <i class="ti ti-search"></i>
      <input id="search" type="text" placeholder="Buscar apodo..." oninput="render()">
    </div>
    <button class="sort-btn active" id="btn-pos" onclick="setSort('pos')">
      <i class="ti ti-trophy"></i>Posición
    </button>
    <button class="sort-btn" id="btn-pts" onclick="setSort('pts')">
      <i class="ti ti-star"></i>Puntos
    </button>
    <span id="count"></span>
  </div>

  <div id="corte-label"></div>

  <div id="tbl-wrap">
    <div id="spinner" style="display:block; padding: 2rem 0;"></div>
    <table id="table" style="display:none">
      <thead>
        <tr>
          <th class="col-pos">Posición</th>
          <th class="col-pts">Puntos</th>
          <th>Apodo</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="state"></div>
  </div>

  <footer>Creado por Carlitos! (👍🏻ᴗ _ᴗ)👍🏻</footer>

</div>

<script>
// ─────────────────────────────────────────────
//  CONFIGURACIÓN
// ─────────────────────────────────────────────
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHRF1IXgiI7vPbEvpaMsreeIfkqnP0N32sFQu1t4W7GsSPgqdJx6HBSCa9sWq_iCCQwhdLiz3Dz1a5/pub?gid=0&single=true&output=csv";
// ─────────────────────────────────────────────

let ALL = [], sortKey = 'pos', sortDir = 1;

function posLabel(p) {
  if(p===1)return'🥇'; if(p===2)return'🥈'; if(p===3)return'🥉'; return'#'+p;
}

function setSort(k) {
  if(sortKey===k){sortDir*=-1}else{sortKey=k;sortDir=k==='pos'?1:-1}
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+k).classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let rows = ALL.filter(r => r.alias.toLowerCase().includes(q));
  rows.sort((a,b) => {
    let v = sortKey==='pos' ? (a.pos-b.pos) : (b.pts-a.pts);
    if(v===0) v = a.alias.localeCompare(b.alias,'es');
    return v * sortDir;
  });
  document.getElementById('count').textContent = rows.length + ' jugadores';
  const state = document.getElementById('state');
  if(rows.length===0) {
    state.innerHTML = '<i class="ti ti-search-off"></i>Sin resultados para tu búsqueda.';
    state.style.display='block';
    document.getElementById('tbody').innerHTML='';
    return;
  }
  state.style.display='none';
  document.getElementById('tbody').innerHTML = rows.map(r => `
    <tr>
      <td class="col-pos">${posLabel(r.pos)}</td>
      <td class="col-pts"><span class="pts-pill">${r.pts}</span></td>
      <td class="col-alias">${r.alias}</td>
    </tr>`).join('');
}

function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => l.replace(/\r/,''));
  const header = lines[0].toLowerCase();
  const start = (header.includes('posici') || header.includes('lugar') || header.includes('apodo') || header.includes('pos')) ? 1 : 0;
  // Lee el corte desde F1 (columna índice 5 de la primera fila)
  const firstRow = lines[0].split(',').map(c => c.trim().replace(/^"|"$/g,''));
  const corteLabel = firstRow[5] || '';
  const data = lines.slice(start).map(line => {
    const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g,''));
    return { pos: parseInt(cols[0]), alias: cols[2], pts: parseInt(cols[1]) };
  }).filter(r => !isNaN(r.pos) && r.alias && !isNaN(r.pts));
  return { data, corteLabel };
}

async function loadData() {
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('table').style.display = 'none';

  if (!SHEET_CSV_URL || SHEET_CSV_URL.startsWith('PEGAR')) {
    showError('Falta configurar la URL del CSV.<br>Edita el archivo index.html y pega la URL en <code>SHEET_CSV_URL</code>.');
    return;
  }

  try {
    const res = await fetch(SHEET_CSV_URL);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const { data, corteLabel } = parseCSV(text);
    ALL = data;
    if(ALL.length === 0) throw new Error('El CSV no tiene datos válidos.');

    document.getElementById('badge-corte').textContent = corteLabel ? 'Corte: ' + corteLabel : 'Ritmos 2026';
    document.getElementById('corte-label').textContent = corteLabel ? 'Última actualización: ' + corteLabel : '';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('table').style.display = 'table';
    render();
  } catch(e) {
    showError('No se pudo cargar el ranking.<br><small>' + e.message + '</small>');
  }
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  const s = document.getElementById('state');
  s.innerHTML = '<i class="ti ti-alert-circle"></i>' + msg;
  s.style.display = 'block';
  document.getElementById('badge-corte').textContent = 'Sin datos';
}

loadData();
</script>
</body>
</html>
